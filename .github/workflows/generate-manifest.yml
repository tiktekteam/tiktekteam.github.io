name: Generate Simulations Manifest

on:
  push:
    branches: [ main ]
    paths:
      - 'simulations/**'
  workflow_dispatch:  # Allow manual triggering

jobs:
  generate-manifest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'
      
      - name: Generate manifest.json
        run: |
          # Create a script to generate the manifest
          cat > generate-manifest.js << 'EOF'
          const fs = require('fs');
          const path = require('path');

          // Path to the simulations directory
          const simulationsDir = path.join(process.cwd(), 'simulations');
          const manifestPath = path.join(simulationsDir, 'manifest.json');

          // Get all HTML files in the simulations directory
          const files = fs.readdirSync(simulationsDir)
            .filter(file => file.endsWith('.html'))
            .sort();

          console.log(`Found ${files.length} simulation files`);
          files.forEach(file => console.log(`- ${file}`));

          // Write the manifest file
          fs.writeFileSync(manifestPath, JSON.stringify(files, null, 2));
          console.log(`Manifest written to ${manifestPath}`);
          EOF

          # Run the script
          node generate-manifest.js
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add simulations/manifest.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update simulations manifest" && git push)