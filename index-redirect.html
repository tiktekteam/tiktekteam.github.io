<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            line-height: 1.6;
        }
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>Loading Fresh Content</h1>
    <p>Please wait while we load the latest version of the site...</p>
    <div class="loader"></div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Generate a unique cache-busting parameter
            const timestamp = new Date().getTime();
            const random = Math.random().toString(36).substring(2, 15);
            const cacheBuster = `v=${timestamp}-${random}`;
            
            // Clear any existing localStorage data
            try {
                localStorage.clear();
                console.log('Local storage cleared');
            } catch (e) {
                console.error('Error clearing local storage:', e);
            }
            
            // Redirect to the main page with cache-busting parameter
            setTimeout(function() {
                window.location.href = `index.html?${cacheBuster}`;
            }, 1500); // Short delay for better user experience
        });
    </script>
    
    <noscript>
        <p>JavaScript is required to load the latest content. Please enable JavaScript or <a href="index.html">click here</a> to continue.</p>
    </noscript>
</body>
</html>
